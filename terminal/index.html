<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPHERGENT:// Terminal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/terminal/terminal.css">
  <script src="/terminal/clive_haiku.js"></script>
  <script src="/terminal/a1_responses.js"></script>
</head>
<body>

<div id="terminal-overlay">
  <!-- Scanlines handled by CSS pseudo-elements -->
  <div id="terminal-output" aria-live="polite" aria-label="Terminal output"></div>
  <div id="terminal-input-row">
    <span id="terminal-prompt-label">EPHERGENT://</span>
    <input
      id="terminal-input"
      type="text"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-label="Terminal command input"
      disabled
      placeholder="Type HELP to begin..."
    >
  </div>
</div>

<script src="/terminal/terminal.js"></script>
</body>
</html>
