<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Ephergent — creative work at the edge of transmission.">
    <meta name="theme-color" content="#08080a">
    <meta property="og:title" content="The Ephergent">
    <meta property="og:description" content="Creative work at the edge of transmission.">
    <meta property="og:type" content="website">
    <title>THE EPHERGENT</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Karla:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Colors — cosmic void with intentional neon */
            --color-bg: #08080a;
            --color-surface: #111113;
            --color-text: #e8e4df;
            --color-text-muted: #5c5a57;
            --color-accent: #e8115b;
            --color-accent-dim: #8a0a35;
            --color-border: #1e1c20;

            /* Typography scale — 1.333 perfect fourth */
            --text-xs: clamp(0.65rem, 1vw, 0.7rem);
            --text-sm: clamp(0.8rem, 1.2vw, 0.875rem);
            --text-base: clamp(1rem, 1.5vw, 1.125rem);
            --text-lg: clamp(1.2rem, 2vw, 1.5rem);
            --text-xl: clamp(1.5rem, 3vw, 2.25rem);
            --text-2xl: clamp(2rem, 5vw, 3.5rem);
            --text-hero: clamp(3.5rem, 14vw, 10rem);

            /* Spacing — 4pt base */
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-12: 3rem;
            --space-16: 4rem;
            --space-24: 6rem;
            --space-32: 8rem;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Karla', system-ui, sans-serif;
            font-weight: 300;
            line-height: 1.65;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* ─── Noise Overlay ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
        }

        /* ─── Layout ─── */
        .page {
            max-width: 72rem;
            margin: 0 auto;
            padding: 0 var(--space-8);
        }

        /* ─── Header ─── */
        header {
            padding: var(--space-8) 0;
            border-bottom: 1px solid var(--color-border);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .wordmark {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-xs);
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-text-muted);
        }

        .signal-indicator {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-xs);
            letter-spacing: 0.1em;
            color: var(--color-text-muted);
        }

        .signal-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-accent);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ─── Hero ─── */
        .hero {
            padding: var(--space-32) 0;
            border-bottom: 1px solid var(--color-border);
            position: relative;
            overflow: hidden;
        }

        .hero-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-xs);
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-accent);
            margin-bottom: var(--space-8);
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.1s forwards;
        }

        .hero-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: var(--text-hero);
            font-weight: 400;
            line-height: 0.88;
            letter-spacing: -0.03em;
            color: var(--color-text);
            position: relative;
            opacity: 0;
            animation: glitchHero 1.2s ease-out 0.3s forwards;
        }

        /* Controlled glitch effect — no random flashes, no seizure risk */
        .hero-title .glitch-layer {
            position: absolute;
            inset: 0;
            color: var(--color-accent);
            opacity: 0;
        }

        .hero:hover .glitch-layer {
            animation: glitchText 4s infinite;
        }

        @keyframes glitchText {
            0%, 100% { opacity: 0; transform: translate(0); }
            92% { opacity: 0; transform: translate(0); }
            93% { opacity: 0.7; transform: translate(-3px, 1px) skewX(-2deg); }
            94% { opacity: 0; transform: translate(0); }
            96% { opacity: 0.5; transform: translate(2px, -1px) skewX(1deg); }
            97% { opacity: 0; transform: translate(0); }
        }

        .hero-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-sm);
            font-weight: 400;
            letter-spacing: 0.04em;
            color: var(--color-text-muted);
            margin-top: var(--space-12);
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        .hero-subtitle span {
            color: var(--color-accent);
        }

        /* ─── Work Teaser ─── */
        .work {
            padding: var(--space-24) 0;
            border-bottom: 1px solid var(--color-border);
        }

        .work-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-xs);
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            margin-bottom: var(--space-8);
        }

        .work-tagline {
            font-family: 'Archivo Black', sans-serif;
            font-size: var(--text-2xl);
            font-weight: 400;
            color: var(--color-text);
            max-width: 48rem;
            line-height: 1.35;
        }

        .work-tagline em {
            font-style: normal;
            color: var(--color-accent);
        }

        /* ─── Contact ─── */
        .contact {
            padding: var(--space-24) 0;
            border-bottom: 1px solid var(--color-border);
        }

        .contact-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-xs);
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            margin-bottom: var(--space-6);
        }

        .contact-link {
            font-family: 'Archivo Black', sans-serif;
            font-size: var(--text-xl);
            font-weight: 400;
            color: var(--color-text);
            text-decoration: none;
            position: relative;
            display: inline-block;
        }

        .contact-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--color-accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .contact-link:hover {
            color: var(--color-accent);
        }

        .contact-link:hover::after {
            transform: scaleX(1);
        }

        /* ─── Footer ─── */
        footer {
            padding: var(--space-12) 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-copy {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            letter-spacing: 0.08em;
        }

        /* ─── Animations ─── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(1.5rem);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glitchHero {
            0% {
                opacity: 0;
                clip-path: inset(0 0 100% 0);
            }
            10% {
                opacity: 1;
                clip-path: inset(0 0 80% 0);
            }
            20% {
                clip-path: inset(40% 0 40% 0);
            }
            30% {
                clip-path: inset(0 0 0 0);
            }
            100% {
                opacity: 1;
                clip-path: inset(0 0 0 0);
            }
        }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .page {
                padding: 0 var(--space-6);
            }

            .hero {
                padding: var(--space-16) 0;
            }

            .work {
                padding: var(--space-16) 0;
            }

            .work-tagline {
                font-size: var(--text-xl);
            }

            .contact {
                padding: var(--space-16) 0;
            }

            .contact-link {
                font-size: var(--text-lg);
            }

            footer {
                flex-direction: column;
                gap: var(--space-4);
                text-align: center;
            }
        }

        /* ─── Reduced Motion ─── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }

            .hero-title .glitch-layer {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div class="header-inner">
                <span class="wordmark">EPHERGENT</span>
                <div class="signal-indicator">
                    <span class="signal-dot"></span>
                    <span>TRANSMITTING</span>
                </div>
            </div>
        </header>

        <section class="hero">
            <p class="hero-label">Signal · 001</p>
            <h1 class="hero-title">
                THE
                <span class="glitch-layer" aria-hidden="true">THE</span>
                EPHERGENT
                <span class="glitch-layer" aria-hidden="true">EPHERGENT</span>
            </h1>
            <p class="hero-subtitle">creative transmission · <span>end of line</span> · 2024</p>
        </section>

        <section class="work">
            <p class="work-label">Transmission Log</p>
            <p class="work-tagline">Art, code, and everything that falls <em>between the frames</em>.</p>
        </section>

        <section class="contact">
            <p class="contact-label">Establish Connection</p>
            <a href="mailto:signal@ephergent.com" class="contact-link">signal@ephergent.com</a>
        </section>

        <footer>
            <span class="footer-copy">EPHERGENT · 2024</span>
            <span class="footer-copy">ALL RIGHTS RESERVED</span>
        </footer>
    </div>
</body>
</html>
